README Rock-Paper-Scissors:

Rock-Paper-Scissors Game 🎮

Introduction

Welcome to the Rock-Paper-Scissors Game, a Python-based implementation of the classic and timeless game! This interactive project supports two gameplay modes:
	•	Player vs Computer
	•	Player vs Player

The game keeps track of scores over multiple rounds and announces the final winner, making it both engaging and competitive.

Features
	•	Play against the computer or challenge a friend in a 2-player mode.
	•	Multi-round gameplay with scores tracked for each player.
	•	User-friendly interface with real-time feedback for each round.
	•	Winner determination based on classic game rules:
	•	Rock beats Scissors
	•	Scissors beat Paper
	•	Paper beats Rock

Prerequisites

Make sure you have Python 3.6 or higher installed on your machine.

How to Run the Game

Clone the Repository

git clone https://github.com/yourusername/rock-paper-scissors.git
cd rock-paper-scissors

Run the Game

Simply execute the Python script:

python rock_paper_scissors.py

How to Play
	1.	Select the number of rounds you’d like to play.
	2.	Choose your gameplay mode:
	•	Player vs Computer
	•	Player vs Player
	3.	Enter your choice for each round:
	•	1 for Rock
	•	2 for Paper
	•	3 for Scissors
	4.	Watch the scores update after each round and see the final winner declared at the end!

